<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영영풀이 학습</title>
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영영풀이">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
:root{
 --bg:#eef1f8;--card:#fff;--ink:#1d2330;--sub:#5b6675;
 --brand:#4f46e5;--brand-d:#4338ca;--teal:#0d9488;--line:#e4e8f1;
 --en:#3730a3;--ko:#0f766e;--good:#16a34a;--bad:#dc2626;
 --pen:#eef0ff;--penb:#d7dbff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:"Pretendard","Noto Sans KR",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
 background:var(--bg);color:var(--ink);line-height:1.55;font-size:15px;overscroll-behavior-y:none}
.app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);
 padding:9px 12px;box-shadow:0 2px 8px rgba(20,30,60,.05)}
.hrow{display:flex;align-items:center;gap:8px;min-height:30px}
.back{border:1px solid var(--line);background:#f7f8fc;border-radius:9px;width:34px;height:32px;font-size:16px;
 cursor:pointer;color:var(--brand-d);font-weight:800;flex:0 0 auto}
.back:disabled{opacity:.35}
.htitle{font-size:14.5px;font-weight:800;letter-spacing:-.3px}
.crumb{font-size:11px;color:var(--sub);margin-top:5px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.crumb span{white-space:nowrap}
.crumb i{color:#bcc3d2;font-style:normal}
.crumb b{color:var(--brand-d);font-weight:700}
main{flex:1;padding:14px 12px 30px}
.lead{font-size:13px;color:var(--sub);margin:2px 2px 13px}
.lead b{color:var(--ink)}
.grid{display:grid;gap:10px}
.grid.c2{grid-template-columns:1fr 1fr}
.tile{background:#fff;border:1px solid var(--line);border-radius:15px;padding:16px 14px;cursor:pointer;
 transition:.13s;display:flex;flex-direction:column;gap:3px;text-align:left;box-shadow:0 1px 2px rgba(20,30,60,.04)}
.tile:active{transform:scale(.98)}
.tile.big{align-items:center;text-align:center;padding:22px 14px}
.tile .ic{font-size:26px;margin-bottom:3px}
.tile .nm{font-size:16px;font-weight:800}
.tile .sb{font-size:11.5px;color:var(--sub)}
.tile.disabled{opacity:.5;cursor:not-allowed;background:#f6f7fa}
.tile.brand{border-color:var(--penb);background:linear-gradient(160deg,#fff,#f4f5ff)}
.list{display:flex;flex-direction:column;gap:9px}
.lrow{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;cursor:pointer;
 display:flex;align-items:center;gap:12px;transition:.13s}
.lrow:active{transform:scale(.99)}
.lrow .badge{min-width:34px;height:34px;border-radius:10px;background:var(--brand);color:#fff;font-weight:800;
 display:flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 auto}
.lrow .body{flex:1}
.lrow .t1{font-size:15px;font-weight:800}
.lrow .t2{font-size:11.5px;color:var(--sub)}
.lrow .arr{color:#c2c8d6;font-size:18px;font-weight:800}
.gear{margin-top:14px;width:100%;border:1px dashed var(--penb);background:#f6f7ff;color:var(--brand-d);
 border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.note{font-size:11.5px;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:10px;
 padding:9px 11px;margin-bottom:12px}
/* scope */
.scoperow{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);
 border-radius:12px;padding:13px 14px;margin-bottom:8px;cursor:pointer}
.chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:0 0 auto;display:flex;
 align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:900}
.scoperow.on .chk{background:var(--teal);border-color:var(--teal)}
.scoperow .nm{font-weight:700;flex:1}
.scoperow .ct{font-size:11.5px;color:var(--sub)}
.savebar{position:sticky;bottom:0;background:var(--bg);padding:12px 0 4px}
.bigbtn{display:block;width:100%;border:0;background:var(--teal);color:#fff;border-radius:13px;padding:14px;
 font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.bigbtn.sec{background:#fff;color:var(--teal);border:1px solid #c3ece5;margin-top:9px}
/* tabs (study) */
.setdesc{font-size:11.5px;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:10px;
 padding:8px 11px;margin-bottom:11px}
.setdesc b{color:var(--brand-d)}
.barrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.barrow .n{font-size:11.5px;color:var(--sub)}
.mini{border:1px solid var(--line);background:#fff;color:var(--sub);border-radius:999px;padding:6px 12px;
 font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit}
.mini.on{background:#fff7ed;border-color:#fed7aa;color:#b45309}
.tbl{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden}
.tr{display:grid;grid-template-columns:1fr 1.3fr;border-bottom:1px solid var(--line)}
.tr:last-child{border-bottom:0}
.tr.head{background:#f7f8fc;font-size:10.5px;font-weight:800;color:var(--sub);text-transform:uppercase}
.td{padding:11px 12px;font-size:13px;display:flex;align-items:center;border-left:1px solid var(--line);flex-wrap:wrap}
.td:first-child{border-left:0}
.td.a{font-weight:700}
.td.b{color:var(--ko);font-weight:600}
.eng{color:var(--en)!important}
.kw{color:#dc2626;font-weight:800}
.sl{color:#c2c8d6;margin:0 4px;font-weight:700}
.blur .tr:not(.head) .td.b{filter:blur(6px);cursor:pointer}
.blur .tr .td.b.show{filter:none}
.fc-wrap{display:flex;flex-direction:column;gap:13px}
.fc{width:100%;height:330px;perspective:1200px;cursor:pointer}
.fc-in{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.fc.flip .fc-in{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;background:#fff;border:1px solid var(--line);
 box-shadow:0 6px 20px rgba(20,30,60,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;
 padding:24px;text-align:center}
.face .lab{position:absolute;top:14px;left:0;right:0;font-size:10.5px;font-weight:800;color:var(--sub);text-transform:uppercase}
.face .txt{font-size:22px;font-weight:800;word-break:keep-all;line-height:1.4}
.face.rear{transform:rotateY(180deg);background:linear-gradient(160deg,#f7f8ff,#eef7f5)}
.face.rear .txt{font-size:17px;font-weight:700;color:var(--ko)}
.face .txt.eng{color:var(--en)}
.face .hint{position:absolute;bottom:13px;left:0;right:0;font-size:11px;color:#aab}
.fc-meta{display:flex;justify-content:space-between;align-items:center}
.fc-meta .cnt{font-size:13px;font-weight:800;color:var(--sub)}
.chipbar{display:flex;gap:6px}
.fc-ctl{display:flex;gap:10px}
.fc-ctl .nav{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;font-size:15px;
 font-weight:800;cursor:pointer;font-family:inherit;color:var(--brand-d)}
.spk{position:absolute;top:12px;right:14px;border:1px solid var(--line);background:#fff;border-radius:10px;font-size:15px;padding:4px 9px;cursor:pointer;z-index:2}
.spkt{border:1px solid var(--line);background:#fff;border-radius:7px;font-size:11px;padding:2px 6px;margin-right:8px;cursor:pointer;flex:0 0 auto}
.fc-judge{display:flex;gap:10px}
.jb{flex:1;border:1px solid var(--line);border-radius:12px;padding:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.jb.no{color:var(--bad);background:#fff5f5;border-color:#fecaca}
.jb.yes{color:var(--good);background:#f0fdf4;border-color:#bbf7d0}
.jb.yes.done{background:var(--good);color:#fff;border-color:var(--good)}
.resume{background:linear-gradient(135deg,var(--brand),var(--teal));color:#fff;border-radius:13px;padding:13px 15px;margin-bottom:12px;cursor:pointer;font-weight:800;display:flex;flex-direction:column;gap:3px}
.resume span{font-size:11.5px;font-weight:600;opacity:.92}
.qtop{display:flex;justify-content:space-between;margin-bottom:10px}
.qtop .info{font-size:12px;font-weight:700;color:var(--sub)}
.qprompt{background:#fff;border:1px solid var(--line);border-radius:13px;padding:22px 16px;text-align:center;font-size:21px;font-weight:800;margin-bottom:12px;word-break:keep-all;display:flex;align-items:center;justify-content:center;flex-wrap:wrap}
.qopts{display:flex;flex-direction:column;gap:9px}
.qopt{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;word-break:keep-all;line-height:1.4}
.qopt.correct{border-color:var(--good);background:#eafaf0;color:var(--good)}
.qopt.wrongo{border-color:var(--bad);background:#fdecec;color:var(--bad)}
.qend{text-align:center;padding:12px}
.qbig{font-size:42px;font-weight:800;color:var(--brand)}
.qsub{color:var(--sub);font-weight:700}
.qwrap{background:#fff;border:1px solid var(--line);border-radius:13px;padding:4px 0;margin:12px 0}
.qwh{font-size:12px;font-weight:800;color:var(--bad);padding:9px 14px}
.qwrow{display:flex;justify-content:space-between;gap:10px;padding:9px 14px;border-top:1px solid var(--line);font-size:13px}
.qwrow b{color:var(--ink)}
.qwrow span{color:var(--ko);text-align:right}
.atblwrap{overflow-x:auto}
.atbl{min-width:520px;background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden}
.atr{display:grid;grid-template-columns:0.85fr 0.95fr 1.7fr 1.7fr;border-bottom:1px solid var(--line)}
.atr:last-child{border-bottom:0}
.atr.ahead{background:#f7f8fc;font-size:10.5px;font-weight:800;color:var(--sub);text-transform:uppercase}
.atd{padding:9px 9px;font-size:11.5px;border-left:1px solid var(--line);display:flex;align-items:center;flex-wrap:wrap;gap:3px;word-break:keep-all;line-height:1.4}
.atd:first-child{border-left:0}
.atd.aw{font-weight:700}
.atd.ak{color:var(--ko);font-weight:600}
.atbl.ablur .atr:not(.ahead) .atd.ak{filter:blur(5px);cursor:pointer}
.atbl.ablur .atr .atd.ak.show{filter:none}
.tmcols{display:grid;grid-template-columns:1fr 1fr 0.7fr;gap:7px;align-items:stretch}
.tmcol{display:grid;grid-auto-rows:1fr;gap:7px}
.tmc{background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:9px 6px;font-size:11.5px;font-weight:600;cursor:pointer;min-height:50px;display:flex;align-items:center;justify-content:center;text-align:center;word-break:keep-all;line-height:1.35;transition:.12s}
.tmc.b,.tmc.c{color:var(--en)}
.tmc.a{color:var(--ko)}
.tmc.sel{border-color:var(--brand);background:#eef0ff;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.tmc.matched{border-color:var(--good);background:#eafaf0;color:var(--good);opacity:.5;pointer-events:none}
.tmc.wrong{border-color:var(--bad);background:#fdecec;animation:shake .3s}
.mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mtop .info{font-size:11.5px;color:var(--sub);font-weight:700}
.mcols{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch}
.mcol{display:grid;grid-auto-rows:1fr;gap:8px}
.mcard{background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:11px 8px;font-size:12px;
 font-weight:600;cursor:pointer;min-height:52px;display:flex;align-items:center;justify-content:center;
 text-align:center;word-break:keep-all;transition:.12s;line-height:1.35}
.mcard.r{color:var(--ko)}
.mcard.r.eng{color:var(--en)}
.mcard.sel{border-color:var(--brand);background:#eef0ff;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.mcard.matched{border-color:var(--good);background:#eafaf0;color:var(--good);opacity:.5;pointer-events:none}
.mcard.wrong{border-color:var(--bad);background:#fdecec;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.mdone{text-align:center;padding:16px;background:#eafaf0;border:1px solid #bbf7d0;border-radius:13px;margin-bottom:10px}
.mdone b{color:var(--good)}
footer{text-align:center;color:var(--sub);font-size:11px;padding:14px}
@media(min-width:820px){.app{max-width:720px}.fc{height:380px}.face .txt{font-size:26px}.tbl .td{font-size:14.5px}.mcard{font-size:14px;min-height:60px}}
.printhead{display:none}
@media print{
 header,footer,.setdesc,.barrow,.spkt,.spk{display:none !important}
 .app{max-width:100% !important;min-height:0}
 main{padding:0 !important}
 body,.app{background:#fff !important}
 .printhead{display:block !important;font-size:15px;font-weight:800;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid #000}
 .tbl{border:1px solid #000;border-radius:0}
 .tr{break-inside:avoid;border-bottom:1px solid #000}
 .td{border-left:1px solid #000}
 .td .eng,.td.b{color:#000 !important}
 .tbl.blur .tr:not(.head) .td.b{filter:none !important;color:transparent !important}
}
</style>
</head>

const dispPub=p=>p.replace('YMB','YBM');
function hasData(grade,pub){return DB[grade]&&DB[grade][pub];}
function lessonsOf(grade,pub){return hasData(grade,pub)?Object.keys(DB[grade][pub]).sort():[];}
function esc(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function chunked(str,kw){return esc(str).split(' / ').map(function(c,i){
 if(kw&&kw.length){kw.forEach(function(k){var ek=esc(k);if(ek&&c.indexOf(ek)>=0)c=c.split(ek).join('\u0001'+ek+'\u0002');});}
 c=c.split('\u0001').join('<span class="kw">').split('\u0002').join('</span>');
 return (i?'<span class="sl">/</span>':'')+c;}).join('');}
function plain(str){return esc(str).split(' / ').join(' ');}
function escA(s){return (s+'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function speak(t){try{if(!t)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.9;speechSynthesis.speak(u);}catch(e){}}
function loadM(){try{return JSON.parse(localStorage.getItem('mastery'))||{};}catch(e){return {};}}
function saveM(m){try{localStorage.setItem('mastery',JSON.stringify(m));}catch(e){}}
function lkey(){return st.grade+'|'+SCHOOL[st.school][st.grade]+'|'+st.lesson;}
function isKnown(wi){var o=loadM()[lkey()]||{};return !!o[wi];}
function setKnown(wi,v){var m=loadM();var o=m[lkey()]||(m[lkey()]={});if(v)o[wi]=1;else delete o[wi];if(!Object.keys(o).length)delete m[lkey()];saveM(m);}
function knownCount(g,pub,L){var o=loadM()[g+'|'+pub+'|'+L]||{};return Object.keys(o).length;}

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
// scope storage
function scopeKey(s,g){return 'vocabscope:'+s+':'+g;}
function getScope(s,g){
 const all=lessonsOf(g,SCHOOL[s][g]);
 try{const v=JSON.parse(localStorage.getItem(scopeKey(s,g)));if(Array.isArray(v))return v.filter(x=>all.includes(x));}catch(e){}

 if(Array.isArray(ds))return ds.filter(x=>all.includes(x));

const PER=4;
let mt={round:0,rounds:null};
function mtInit(){
 const idx=shuffle(S.items.map((_,i)=>i));mt.rounds=[];
 for(let i=0;i<idx.length;i+=PER)mt.rounds.push(idx.slice(i,i+PER).map(k=>({id:k,a:S.items[k].a,b:S.items[k].b})));
 mt.round=0;
}
function renderMatch(){
 const grp=mt.rounds[mt.round];const total=mt.rounds.length;
 const L=shuffle(grp),R=shuffle(grp);
 const lh=L.map(p=>'<div class="mcard l" data-id="'+p.id+'">'+(S.aeng?'<span class="eng">'+plain(p.a)+'</span>':plain(p.a))+'</div>').join('');
 const rh=R.map(p=>'<div class="mcard r '+(S.beng?'eng':'')+'" data-id="'+p.id+'">'+plain(p.b)+'</div>').join('');
 view.innerHTML=setDesc()+'<div class="mtop"><span class="info">라운드 '+(mt.round+1)+'/'+total+'</span><span class="info">'+S.fa+' ↔ '+S.fb+'</span></div>'+
  '<div id="mboard"><div class="mcols"><div class="mcol">'+lh+'</div><div class="mcol">'+rh+'</div></div></div>'+
  '<button class="bigbtn sec" id="reshuf" style="margin-top:12px">🔀 전체 다시 섞기</button>';
 let selL=null,selR=null;
 const board=document.getElementById('mboard');
 board.querySelectorAll('.mcard.l').forEach(c=>c.onclick=()=>pick(c,'L'));
 board.querySelectorAll('.mcard.r').forEach(c=>c.onclick=()=>pick(c,'R'));
 document.getElementById('reshuf').onclick=()=>{mtInit();renderMatch();};
 function pick(c,side){
  if(c.classList.contains('matched'))return;
  if(side=='L'){if(selL)selL.classList.remove('sel');selL=c;}else{if(selR)selR.classList.remove('sel');selR=c;}
  c.classList.add('sel');
  if(selL&&selR){
   const a=selL,b=selR;
   if(a.dataset.id===b.dataset.id){
    a.classList.add('matched');b.classList.add('matched');a.classList.remove('sel');b.classList.remove('sel');selL=selR=null;
    if(board.querySelectorAll('.mcard.l.matched').length===grp.length)done();
   }else{
    a.classList.add('wrong');b.classList.add('wrong');const x=a,y=b;selL=selR=null;
    setTimeout(()=>{x.classList.remove('wrong','sel');y.classList.remove('wrong','sel');},350);
   }
  }
 }
 function done(){
  const last=mt.round>=total-1;
  board.insertAdjacentHTML('beforebegin','<div class="mdone"><b>✅ 라운드 완료!</b></div>');
  const btn=document.createElement('button');btn.className='bigbtn';btn.style.marginTop='10px';
  btn.textContent=last?'🎉 전부 완료! 처음부터':'다음 라운드 ▶';
  btn.onclick=()=>{if(last)mtInit();else mt.round++;renderMatch();};
  board.after(btn);
 }
}

 var r=getResume();
 if(!r||!r.school||!SCHOOL[r.school]||!hasData(r.grade,SCHOOL[r.school]?SCHOOL[r.school][r.grade]:''))return '';
 var pub=SCHOOL[r.school][r.grade];
 if(!DB[r.grade]||!DB[r.grade][pub]||!DB[r.grade][pub][r.lesson])return '';
 var tn={table:'암기표',flash:'플래시카드',match:'매칭게임',quiz:'퀴즈'}[r.tool]||'';
 return '<div class="resume" id="resumeBtn">▶ 이어서 학습 <span>'+r.school+' 중'+r.grade+' · '+r.lesson+(r.setIdx!=null?' · '+(+r.setIdx+1)+'세트':'')+' '+tn+'</span></div>';

 var r=getResume(); if(!r)return;
 var pub=SCHOOL[r.school][r.grade];
 if(!DB[r.grade]||!DB[r.grade][pub]||!DB[r.grade][pub][r.lesson])return;
 st.school=r.school;st.grade=r.grade;st.lesson=r.lesson;st.setIdx=r.setIdx;st.tool=r.tool;
 SETS=buildSets(DB[r.grade][pub][r.lesson].entries);
 go('study');
}
/* QUIZ */
let qz={i:0,qs:null,score:0,wrong:[],answered:false};
function qzInit(){
 var items=S.items.slice();
 var pick=shuffle(items.map((_,i)=>i)).slice(0,Math.min(12,items.length));
 qz.qs=pick.map(function(idx){
   var it=items[idx];
   var others=shuffle(items.filter((x,j)=>j!==idx && x.b!==it.b)).slice(0,3).map(x=>x.b);
   var opts=shuffle([it.b].concat(others));
   return {prompt:it.a,promptW:it.w,correct:it.b,opts:opts,wi:it.wi};
 });
 qz.i=0;qz.score=0;qz.wrong=[];qz.answered=false;
}
function renderQuiz(){
 if(!qz.qs)qzInit();
 if(qz.i>=qz.qs.length)return renderQuizEnd();
 var q=qz.qs[qz.i];
 var promptHtml=(S.aeng?'<span class="eng">'+esc(q.prompt)+'</span>':esc(q.prompt));
 var spk=S.aeng?'<button class="spk" style="position:static;margin-left:8px" id="qspk">🔊</button>':'';
 view.innerHTML=setDesc()+
  '<div class="qtop"><span class="info">'+(qz.i+1)+' / '+qz.qs.length+'</span><span class="info">점수 '+qz.score+'</span></div>'+
  '<div class="qprompt">'+promptHtml+spk+'</div>'+
  '<div class="qopts" id="qo">'+q.opts.map(function(o,k){return '<button class="qopt'+(S.beng?' eng':'')+'" data-k="'+k+'">'+plain(o)+'</button>';}).join('')+'</div>'+
  '<div id="qfoot"></div>';
 if(S.aeng){var qs=document.getElementById('qspk'); if(qs)qs.onclick=function(){speak(q.promptW);};}
 var qo=document.getElementById('qo');
 qo.querySelectorAll('.qopt').forEach(function(btn){
   btn.onclick=function(){
     if(qz.answered)return; qz.answered=true;
     var chosen=q.opts[+btn.dataset.k]; var ok=chosen===q.correct;
     setKnown(q.wi,ok);
     qo.querySelectorAll('.qopt').forEach(function(b2){
       var v=q.opts[+b2.dataset.k];
       if(v===q.correct)b2.classList.add('correct');
       else if(b2===btn)b2.classList.add('wrongo');
       b2.style.pointerEvents='none';
     });
     if(ok)qz.score++; else qz.wrong.push({p:q.prompt,c:q.correct});
     document.getElementById('qfoot').innerHTML='<button class="bigbtn" id="qnext">'+(qz.i<qz.qs.length-1?'다음 ▶':'결과 보기')+'</button>';
     document.getElementById('qnext').onclick=function(){qz.i++;qz.answered=false;renderQuiz();};
   };
 });
}
function renderQuizEnd(){
 var n=qz.qs.length;
 view.innerHTML=setDesc()+
  '<div class="qend"><div class="qbig">'+qz.score+' / '+n+'</div><div class="qsub">정답률 '+Math.round(qz.score/n*100)+'%</div></div>'+
  (qz.wrong.length?'<div class="qwrap"><div class="qwh">오답 노트</div>'+qz.wrong.map(function(w){return '<div class="qwrow"><b>'+esc(w.p)+'</b><span>'+plain(w.c)+'</span></div>';}).join('')+'</div>':'<div class="qend"><div class="qsub">전부 정답! 🎉</div></div>')+
  '<button class="bigbtn" id="qretry">🔁 다시 풀기</button>';
 document.getElementById('qretry').onclick=function(){qzInit();renderQuiz();};
}

const PER3=4;
let tm={round:0,rounds:null};
function tmInit(){
 var ents=curEntries().map(function(e,i){return {id:i,kor:e.kor?e.kor.join(' / '):e.t,eng:e.eng?e.eng.join(' / '):e.d,w:e.w};});
 var idx=shuffle(ents.map(function(_,i){return i;}));tm.rounds=[];
 for(var i=0;i<idx.length;i+=PER3)tm.rounds.push(idx.slice(i,i+PER3).map(function(k){return ents[k];}));
 tm.round=0;
}
function renderTriMatch(){
 setTitle(st.lesson+' · 3단매칭');
 if(!tm.rounds)tmInit();
 var grp=tm.rounds[tm.round],total=tm.rounds.length;
 var A=shuffle(grp),B=shuffle(grp),C=shuffle(grp);
 function col(arr,cls,fn){return arr.map(function(p){return '<div class="tmc '+cls+'" data-id="'+p.id+'">'+fn(p)+'</div>';}).join('');}
 view.innerHTML='<div class="setdesc"><b>3단매칭</b> · 직독직해(한글) ↔ 영영풀이(영어) ↔ 영단어</div>'+
   '<div class="mtop"><span class="info">라운드 '+(tm.round+1)+'/'+total+'</span><span class="info">같은 뜻 3장을 찾아 탭</span></div>'+
   '<div id="tmboard"><div class="tmcols">'+
     '<div class="tmcol">'+col(A,'a',function(p){return plain(p.kor);})+'</div>'+
     '<div class="tmcol">'+col(B,'b eng',function(p){return plain(p.eng);})+'</div>'+
     '<div class="tmcol">'+col(C,'c eng',function(p){return esc(p.w);})+'</div>'+
   '</div></div>'+
   '<button class="bigbtn sec" id="tre" style="margin-top:12px">🔀 전체 다시 섞기</button>';
 var sel={a:null,b:null,c:null};
 var board=document.getElementById('tmboard');
 board.querySelectorAll('.tmc').forEach(function(card){
   card.onclick=function(){
     if(card.classList.contains('matched'))return;
     var cls=card.classList.contains('a')?'a':(card.classList.contains('b')?'b':'c');
     if(sel[cls])sel[cls].classList.remove('sel');
     sel[cls]=card;card.classList.add('sel');
     if(sel.a&&sel.b&&sel.c){
       var ok=(sel.a.dataset.id===sel.b.dataset.id&&sel.b.dataset.id===sel.c.dataset.id);
       var xs=[sel.a,sel.b,sel.c];
       if(ok){xs.forEach(function(x){x.classList.add('matched');x.classList.remove('sel');});sel={a:null,b:null,c:null};
         if(board.querySelectorAll('.tmc.a.matched').length===grp.length)tmDone();
       }else{xs.forEach(function(x){x.classList.add('wrong');});sel={a:null,b:null,c:null};
         setTimeout(function(){xs.forEach(function(x){x.classList.remove('wrong','sel');});},350);}
     }
   };
 });
 document.getElementById('tre').onclick=function(){tmInit();renderTriMatch();};
 function tmDone(){
   var last=tm.round>=total-1;
   board.insertAdjacentHTML('beforebegin','<div class="mdone"><b>✅ 라운드 완료!</b></div>');
   var btn=document.createElement('button');btn.className='bigbtn';btn.style.marginTop='10px';
   btn.textContent=last?'🎉 전부 완료! 처음부터':'다음 라운드 ▶';
   btn.onclick=function(){if(last)tmInit();else tm.round++;renderTriMatch();};
   board.after(btn);
 }
}
